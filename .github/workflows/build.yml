name: Flutter APK Builder

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string
      build_type:
        description: 'Release or Debug'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      build_id:
        description: 'Build ID'
        required: true
        type: string
      zip_name:
        description: 'Nama file ZIP asli'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ZIP
        run: |
          echo "Downloading from ${{ github.event.inputs.zip_url }}"
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
          unzip -q project.zip -d project/
          ls -la project/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter Clean & Get
        run: |
          cd project/
          flutter clean
          flutter pub get

      - name: Build APK
        run: |
          cd project/
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            flutter build apk --release
          else
            flutter build apk --debug
          fi

      - name: Find and Rename APK
        id: find_apk
        run: |
          APK_PATH=$(find project/build/app/outputs -name "*.apk" | head -n 1)
          ORIGINAL_NAME="${{ github.event.inputs.zip_name}}"
          APK_NAME="${ORIGINAL_NAME%.zip}.apk"
          FULL_NAME="${{ github.event.inputs.build_id}}_${APK_NAME}"
          cp "$APK_PATH" "$FULL_NAME"
          echo "apk_name=$FULL_NAME" >> $GITHUB_OUTPUT
          echo "APK renamed to: $FULL_NAME"

      - name: Upload APK to GitHub (downloads folder)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          APK_FILE="${{ steps.find_apk.outputs.apk_name }}"
          
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git repo
          cd repo
          
          mkdir -p downloads
          mv ../"$APK_FILE" downloads/"$APK_FILE"
          
          git add downloads/"$APK_FILE"
          git commit -m "Add APK: $APK_FILE"
          git push
          
          cd ..
          rm -rf repo

      - name: Upload Artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.build_id }}
          path: ${{ steps.find_apk.outputs.apk_name }}
          retention-days: 3
